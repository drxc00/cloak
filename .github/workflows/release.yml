name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25"
jobs:
  nerd-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        working-directory: nerd
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          BIN="nerd/target/${{ matrix.target }}/release/cloak-nerd"
          # Strip + set OS/ARCH in filename (GOOS/GOARCH naming — matches
          # what `cloak init` requests, e.g. cloak-nerd-linux-amd64).
          strip "$BIN" || true
          OS=$(echo ${{ matrix.target }} | cut -d- -f3)
          RUST_ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
          case "$RUST_ARCH" in
            x86_64) ARCH=amd64 ;;
            aarch64) ARCH=arm64 ;;
            *) ARCH="$RUST_ARCH" ;;
          esac
          mv "$BIN" "./cloak-nerd-${OS}-${ARCH}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: nerd-${{ matrix.target }}
          path: cloak-nerd-*
          if-no-files-found: error

  nerd-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: nerd
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          BIN="nerd/target/${{ matrix.target }}/release/cloak-nerd"
          strip "$BIN" || true
          OS=$(echo ${{ matrix.target }} | cut -d- -f3)
          RUST_ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
          case "$RUST_ARCH" in
            x86_64) ARCH=amd64 ;;
            aarch64) ARCH=arm64 ;;
            *) ARCH="$RUST_ARCH" ;;
          esac
          mv "$BIN" "./cloak-nerd-${OS}-${ARCH}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: nerd-${{ matrix.target }}
          path: cloak-nerd-*
          if-no-files-found: error

  cloak:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o "cloak-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/cloak/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloak-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cloak-*
          if-no-files-found: error

  release:
    needs: [nerd-linux, nerd-macos, cloak]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # Download all artifacts into a flat directory.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: ./release-assets/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh ./release-assets/

      - name: Generate SHA256 checksums
        working-directory: ./release-assets/
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## cloak ${{ github.ref_name }}

            ### Assets

            | File | Description |
            |---|---|
            | `cloak-{linux,darwin}-{amd64,arm64}` | CLI binary (pure Go, no deps) |
            | `cloak-nerd-{linux,darwin}-{amd64,arm64}` | NER inference sidecar (Rust) |
            | `checksums.txt` | SHA256 checksums for all files |

            ### Model

            The NER model is hosted on Hugging Face Hub ([drxc0/cloak-ner-v1](https://huggingface.co/drxc0/cloak-ner-v1)).
            `cloak init` downloads it automatically — no manual download needed (~130 MB).

            ### Quick start

            ```bash
            # 1. Download the CLI
            curl -sSL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/cloak-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')" -o cloak
            chmod +x cloak

            # 2. Install NER support (model downloads from Hugging Face)
            ./cloak init

            # 3. Redact
            ./cloak redact -t "Call John at +1 555-0198"
            ./cloak redact file.log
            ```
          files: ./release-assets/*
          fail_on_unmatched_files: true
